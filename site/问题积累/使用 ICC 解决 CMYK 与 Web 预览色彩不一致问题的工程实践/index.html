<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>使用 ICC 解决 CMYK 与 Web 预览色彩不一致问题的工程实践</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css">
  <style>
    body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 45px;
      background: #fff;
    }
    @media (max-width: 767px) {
      body { padding: 15px; }
    }
    .markdown-body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; }
    #loading { color: #57606a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #error { color: #cf222e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: none; }
  </style>
</head>
<body>
  <article id="content" class="markdown-body">
    <p id="loading">正在加载内容…</p>
    <p id="error"></p>
  </article>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    marked.setOptions({ gfm: true, breaks: false });
    fetch('content.md')
      .then(function (res) {
        if (!res.ok) throw new Error('无法加载 content.md (' + res.status + ')');
        return res.text();
      })
      .then(function (text) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').innerHTML = marked.parse(text);
      })
      .catch(function (err) {
        document.getElementById('loading').style.display = 'none';
        var el = document.getElementById('error');
        el.style.display = 'block';
        el.textContent = err.message;
      });
  </script>
</body>
</html>
